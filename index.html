<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club IA - outils pour collégiens</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
<aside class="sidebar" id="sidebar">
<div class="sb-brand"><div class="logo">IA</div><div><h2>Club IA</h2><p>Gemini pour collégiens</p></div></div>
<nav class="sb-nav" id="sNav"></nav>
<div class="sb-foot">
<div class="theme-tog" id="themeTog">
<span><i class="fa-solid fa-sun"></i> / <i class="fa-solid fa-moon"></i> Thème</span>
<div class="tog-track"><div class="tog-thumb"><i class="fa-solid fa-sun"></i></div></div>
</div>
</div>
</aside>
<div class="main">
<header class="topbar">
<div class="top-l"><button class="menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button><h1 id="topTitle">Tableau de bord</h1></div>
<div class="top-r"><input type="text" class="name-inp" id="nameInp" placeholder="Ton prénom..." maxlength="30"><button class="btn-icon" id="certBtn" title="Certificat" style="display:none"><i class="fa-solid fa-award"></i></button></div>
</header>
<main class="content" id="content"></main>
</div>
</div>
<div class="toast-box" id="toastBox"></div>
<div class="modal-ov" id="modalOv"><div class="modal" id="modalC"></div></div>
<script src="script.js"></script>
</body>
</html>
